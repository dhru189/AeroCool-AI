services:
  - type: web
    name: aerocool-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    plan: free

  - type: web
    name: aerocool-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://aerocool-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    plan: free
