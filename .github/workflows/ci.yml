name: AeroCool AI CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — Python checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: cd backend && pip install -r requirements.txt
      - name: Syntax check all Python files
        run: find backend -name "*.py" | xargs python -m py_compile && echo "All Python files OK"
      - name: Test FastAPI imports
        run: cd backend && python -c "from api.main import app; print('FastAPI OK')"

  frontend:
    name: Frontend — Node build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package.json
      - name: Install and build
        run: cd frontend && npm install && npm run build
